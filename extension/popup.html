<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; width: 280px; padding: 14px; margin: 0; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      button { width: 100%; padding: 10px; font-size: 14px; border: 0; border-radius: 6px; cursor: pointer; margin-top: 6px; }
      .start { background: #1f8a4c; color: #fff; }
      .stop  { background: #b00020; color: #fff; }
      label { display: flex; align-items: center; gap: 6px; font-size: 12px; margin: 6px 0; }
      #status { font-size: 12px; color: #555; margin-top: 10px; min-height: 16px; }
      #timer { font-variant-numeric: tabular-nums; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Meeting Recorder</h1>
    <label><input type="checkbox" id="mic" checked /> Include microphone</label>
    <label><input type="checkbox" id="tabAudio" checked /> Include tab audio (Meet / Teams web)</label>
    <button id="start" class="start">Start recording</button>
    <button id="stop"  class="stop"  disabled>Stop &amp; save</button>
    <div id="status">Idle. <span id="timer"></span></div>
    <script src="popup.js"></script>
  </body>
</html>
